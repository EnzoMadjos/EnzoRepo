<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mine Tracker</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="app-title">⛏ Mine Tracker</span>
      <span id="tiktok-status" class="status-badge status-off">● Disconnected</span>
    </div>
    <div class="header-right">
      <span id="session-info" class="session-info"></span>
      <a href="/buyers" class="btn btn-ghost">👥 Buyers</a>
    </div>
  </header>

  <!-- Connect bar -->
  <div class="connect-bar">
    <input id="input-username" type="text" class="input" placeholder="@tiktok_username" style="width:200px">
    <button class="btn btn-primary" onclick="connectTikTok()">Connect</button>
    <button class="btn btn-red hidden" id="btn-disconnect" onclick="disconnectTikTok()">Disconnect</button>
    <div style="width:1px;height:24px;background:var(--border);margin:0 4px"></div>
    <button class="btn btn-green" id="btn-start-session" onclick="startSession()">▶ Start Session</button>
    <button class="btn btn-red hidden" id="btn-end-session" onclick="endSession()">■ End Session</button>
  </div>

  <!-- Main layout -->
  <div class="main-layout">

    <!-- Comment feed -->
    <div class="panel panel-feed">
      <div class="panel-header">
        <span>💬 Comments</span>
        <span id="comment-count" class="badge">0</span>
      </div>
      <div id="comment-feed" class="feed-list"></div>
    </div>

    <!-- Mine log -->
    <div class="panel panel-log">
      <div class="panel-header">
        <span>⛏ Mines this session</span>
        <span id="mine-count" class="badge">0</span>
      </div>
      <div id="mine-log" class="mine-list"></div>
    </div>

  </div>

  <!-- Capture modal -->
  <div id="modal-capture" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <span>⛏ New Mine</span>
        <button class="btn-close" onclick="closeCapture()">✕</button>
      </div>
      <div id="capture-warning" class="warning-banner hidden">
        ⚠️ New buyer — <strong id="warn-count"></strong> mines this session!
      </div>
      <div class="modal-body">
        <div class="field">
          <label>TikTok Name</label>
          <input id="cap-name" type="text" class="input" readonly>
        </div>
        <div class="field">
          <label>Handle</label>
          <input id="cap-handle" type="text" class="input" readonly>
        </div>
        <div class="field">
          <label>Price (PHP)</label>
          <input id="cap-price" type="number" class="input" placeholder="0.00" min="0.01" step="0.01">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeCapture()">Cancel</button>
        <button class="btn btn-primary" onclick="saveMine()">🖨 Save &amp; Print</button>
      </div>
    </div>
  </div>

  <!-- Hidden state -->
  <input type="hidden" id="cap-uid">
  <input type="hidden" id="cap-raw">

  <script src="/static/js/dashboard.js"></script>
</body>
</html>
