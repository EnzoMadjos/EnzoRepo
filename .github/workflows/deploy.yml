name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./projects/pitogo-app
          file: ./projects/pitogo-app/Dockerfile
          push: true
          tags: ghcr.io/enzomadjos/enzo-repo:latest

  prune-old-images:
    name: Prune old GHCR images (keep latest 3)
    needs: build-and-push
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Delete all untagged package versions
        uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          package-name: enzo-repo
          package-type: container
          min-versions-to-keep: 1
          delete-only-untagged-versions: true
          token: ${{ secrets.GHCR_TOKEN }}
