<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8"/>
<title>{{ title or 'Certificate' }}</title>
<style>
    body { font-family: 'DejaVu Sans', Arial, sans-serif; color:#111; padding:40px; }
    .header { text-align:center; margin-bottom:18px }
    .seal { width:80px; height:80px; display:inline-block; vertical-align:middle; }
    .title { font-size:18px; font-weight:700; margin-top:6px }
    .content { margin-top:20px; font-size:14px; line-height:1.5 }
    .footer { margin-top:36px; display:flex; justify-content:space-between; align-items:center }
    .signature { width:180px; text-align:center }
    .small { font-size:12px; color:#666 }
  </style>
</head>
<body>
<div class="header">
<div style="font-size:12px;">Republic of the Philippines</div>
<div style="font-size:14px;font-weight:700">BARANGAY: {{ household.barangay }}</div>
<div class="title">{{ certificate_type.name if certificate_type else '' }}</div>
</div>
<div class="content">
    {% block body %}{% endblock %}
  </div>
<div class="footer">
<div class="small">Control No: {{ control_number or 'N/A' }}</div>
<div class="signature">
<div style="height:56px;">{% if signature_path %}<img alt="signature" src="{{ signature_path }}" style="max-width:180px;max-height:60px"/>{% endif %}</div>
<div style="font-weight:700">{{ officer_name or '' }}</div>
<div class="small">{{ officer_position or '' }}</div>
</div>
</div>
</body>
</html>
