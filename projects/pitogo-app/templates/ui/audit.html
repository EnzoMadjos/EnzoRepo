<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Audit Log</title>
  <style>
    body{font-family:system-ui,Segoe UI,Arial;margin:0;background:#f5f7fa;color:#111}
    .card{background:#fff;padding:16px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
    input,select{padding:8px;border:1px solid #ddd;border-radius:6px}
    .btn{padding:7px 13px;border-radius:6px;border:none;background:#0038A8;color:#fff;cursor:pointer;font-weight:600;font-size:.85rem}
    .btn-secondary{background:#6c757d}
    .btn-danger{background:#CE1126}
    table{width:100%;border-collapse:collapse;margin-top:12px}
    th,td{border-bottom:1px solid #eee;padding:7px 8px;text-align:left;vertical-align:top}
    th{background:#f8f9fa;font-size:.78rem;font-weight:600;color:#555;text-transform:uppercase}
    td{font-size:.83rem}
    .level-INFO{color:#0038A8;font-weight:600}
    .level-WARNING{color:#856404;font-weight:600}
    .level-ERROR{color:#CE1126;font-weight:600}
    .filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
    .filter-bar label{font-size:.82rem;color:#555}
    .filter-bar input[type=datetime-local]{font-size:.82rem}
    .status-bar{font-size:.84rem;color:#666;min-height:20px;margin-top:4px}
    .pagination{display:flex;gap:6px;align-items:center;margin-top:10px}
    .page-btn{padding:5px 10px;border:1px solid #ddd;border-radius:5px;background:#fff;cursor:pointer;font-size:.82rem}
    .page-btn:disabled{opacity:.45;cursor:default}
    .page-btn.active{background:#0038A8;color:#fff;border-color:#0038A8}
  </style>
</head>
<body>
  {% include 'partials/topbar.html' %}
  <div style="padding:20px 24px">
  <h2>Audit Log</h2>
  <div class="card">
    <div class="filter-bar">
      <input id="q" placeholder="Search message…" style="min-width:180px" onkeydown="if(event.key==='Enter')loadLogs(1)" />
      <select id="level">
        <option value="">All levels</option>
        <option>INFO</option>
        <option>WARNING</option>
        <option>ERROR</option>
      </select>
      <label>From <input id="start" type="datetime-local" /></label>
      <label>To   <input id="end" type="datetime-local" /></label>
      <button class="btn" onclick="loadLogs(1)">Search</button>
      <button class="btn btn-secondary" onclick="exportLogs('csv')">⬇ CSV</button>
      <button class="btn btn-secondary" onclick="exportLogs('json')">⬇ JSON</button>
      <button class="btn btn-danger" id="archiveBtn" onclick="archiveLogs()">Archive</button>
    </div>
    <div class="status-bar" id="status"></div>
    <table id="log_table">
      <thead>
        <tr>
          <th style="width:155px">Timestamp</th>
          <th style="width:80px">Level</th>
          <th>Message</th>
          <th>Details</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </div>

  <script src="/static/js/ui_helpers.js"></script>
  <script>
  function hdrs(){ return authHeaders(); }
  let currentPage = 1;
  const PER_PAGE = 100;

  function setStatus(msg){ document.getElementById('status').textContent = msg || ''; }

  function getFilters(){
    return {
      q: document.getElementById('q').value.trim(),
      level: document.getElementById('level').value,
      start: document.getElementById('start').value,
      end: document.getElementById('end').value,
    };
  }

  function buildParams(extra){
    const f = getFilters();
    const p = new URLSearchParams();
    if(f.q) p.append('q', f.q);
    if(f.level) p.append('level', f.level);
    if(f.start) p.append('start', f.start);
    if(f.end) p.append('end', f.end);
    Object.entries(extra||{}).forEach(([k,v]) => p.append(k, v));
    return p;
  }

  async function loadLogs(page){
    page = page || currentPage;
    currentPage = page;
    setStatus('Loading…');
    try{
      const p = buildParams({page, per_page: PER_PAGE});
      const r = await fetch('/admin/logs?' + p.toString(), {headers: hdrs()});
      const data = await r.json();
      if(!r.ok){ setStatus('Failed to load logs: ' + (data.detail||r.status)); return; }
      const items = data.items || [];
      const total = data.total || 0;

      const tbody = document.querySelector('#log_table tbody');
      tbody.innerHTML = '';
      if(!items.length){
        tbody.innerHTML = '<tr><td colspan=4 style="color:#aaa;text-align:center;padding:20px">No log entries found</td></tr>';
      } else {
        items.forEach(it => {
          const tr = document.createElement('tr');
          const extra = Object.entries(it).filter(([k])=>!['ts','level','msg'].includes(k)).map(([k,v])=>`<span style="color:#777;font-size:.78rem">${k}:</span> ${v}`).join(' &nbsp;');
          tr.innerHTML = `<td style="font-family:monospace;white-space:nowrap;font-size:.78rem">${it.ts||''}</td>
            <td class="level-${(it.level||'').toUpperCase()}">${it.level||''}</td>
            <td>${escHtml(it.msg||'')}</td>
            <td style="color:#666;font-size:.78rem">${extra}</td>`;
          tbody.appendChild(tr);
        });
      }

      setStatus(`${total} total entries — page ${page} of ${Math.max(1, Math.ceil(total/PER_PAGE))}`);
      renderPagination(page, total);
    }catch(e){ setStatus('Network or auth error'); }
  }

  function renderPagination(page, total){
    const container = document.getElementById('pagination');
    const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
    container.innerHTML = '';
    const prev = document.createElement('button'); prev.className='page-btn'; prev.textContent='← Prev';
    prev.disabled = page <= 1; prev.onclick = ()=>loadLogs(page-1); container.appendChild(prev);
    // Show a few page buttons around current
    for(let p = Math.max(1,page-2); p<=Math.min(totalPages,page+2); p++){
      const b = document.createElement('button');
      b.className = 'page-btn'+(p===page?' active':'');
      b.textContent = p; b.onclick = (()=>{const pp=p; return ()=>loadLogs(pp);})();
      container.appendChild(b);
    }
    const next = document.createElement('button'); next.className='page-btn'; next.textContent='Next →';
    next.disabled = page >= totalPages; next.onclick = ()=>loadLogs(page+1); container.appendChild(next);
  }

  function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  async function exportLogs(format){
    setStatus('Preparing ' + format.toUpperCase() + ' export…');
    try{
      const p = buildParams({per_page: 10000, format});
      const r = await fetch('/admin/logs?' + p.toString(), {headers: hdrs()});
      if(!r.ok){ setStatus('Export failed'); return; }
      const blob = await r.blob();
      const disp = r.headers.get('content-disposition') || '';
      const m = /filename=\"?([^\";]+)\"?/.exec(disp);
      const filename = m ? m[1] : `pitogo_logs.${format}`;
      const u = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href=u; a.download=filename; document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(u), 30000);
      setStatus('Export ready');
    }catch(e){ setStatus('Network or auth error'); }
  }

  async function archiveLogs(){
    const ok = await showConfirm('Archive logs?', 'This will package current logs into a ZIP file.');
    if(!ok) return;
    const clear = await showConfirm('Clear log file after archiving?', 'The active log will be emptied. Archived copy is kept.');
    setStatus('Archiving…');
    try{
      const f = getFilters();
      const body = { format: 'zip', clear_after: clear, ...f };
      const r = await fetch('/admin/logs/archive', {method:'POST', headers: hdrs(), body: JSON.stringify(body)});
      const j = await r.json();
      if(!r.ok){ setStatus(j.detail || 'Archive failed'); return; }
      setStatus('Archive created: ' + (j.archive || 'done'));
      if(j.download_url){
        const fr = await fetch(j.download_url, {headers: hdrs()});
        if(fr.ok){
          const blob = await fr.blob();
          const u = URL.createObjectURL(blob);
          const a = document.createElement('a'); a.href=u; a.download=(j.archive||'archive').split('/').pop(); document.body.appendChild(a); a.click(); a.remove();
          setTimeout(()=>URL.revokeObjectURL(u), 30000);
        }
      }
      if(clear) loadLogs(1);
    }catch(e){ setStatus('Network or auth error'); }
  }

  window.addEventListener('DOMContentLoaded', ()=>{ loadLogs(1); });
  </script>
  </div>
</body>
</html>
