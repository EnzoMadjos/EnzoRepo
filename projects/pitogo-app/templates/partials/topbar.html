<style>
  body{margin:0!important;padding:0!important}
  .app-topbar{background:#0038A8;color:#fff;padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.18);gap:12px;border-bottom:3px solid #CE1126}
  .tb-brand{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
  .tb-seal{width:36px;height:36px;object-fit:contain;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.08);flex-shrink:0}
  .tb-brand-text{display:flex;flex-direction:column;line-height:1.2}
  .tb-brand-name{font-size:.88rem;font-weight:700;color:#fff;white-space:nowrap}
  .tb-slogan{font-size:.62rem;color:#FCD116;white-space:nowrap;font-style:italic;font-weight:700}
  .tb-nav{display:flex;align-items:center;gap:2px;overflow-x:auto;scrollbar-width:none}
  .tb-nav::-webkit-scrollbar{display:none}
  .tb-nav a{color:rgba(255,255,255,.88);text-decoration:none;padding:5px 9px;border-radius:6px;font-size:.79rem;font-weight:600;white-space:nowrap}
  .tb-nav a:hover{background:rgba(252,209,22,.15);color:#FCD116}
  .tb-nav a.tb-active{background:rgba(252,209,22,.12);color:#FCD116;border-bottom:2px solid #FCD116}
  .tb-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .tb-username{font-size:.78rem;color:rgba(255,255,255,.82)}
  .tb-logout{background:transparent;border:1px solid rgba(255,255,255,.35);color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.74rem}
  .tb-logout:hover{background:rgba(255,255,255,.12)}
</style>
<div class="app-topbar">
  <a class="tb-brand" href="/ui/dashboard">
    <img class="tb-seal" src="/static/img/seal.png" alt="" onerror="this.style.display='none'" />
    <div class="tb-brand-text">
      <span class="tb-brand-name">{{ app_name }}</span>
      <span class="tb-slogan">#Asenso Pitogo</span>
    </div>
  </a>
  <nav class="tb-nav">
    <a href="/ui/dashboard">Dashboard</a>
    <a href="/ui/issue">Issue</a>
    <a href="/ui/certificates">Certificates</a>
    <a href="/ui/residents">Residents</a>
    <a href="/ui/households">Households</a>
    <a href="/ui/certificate-types">Cert Types</a>
    <a href="/ui/users">Users</a>
    <a href="/ui/audit">Audit</a>
  </nav>
  <div class="tb-right">
    <span class="tb-username" id="tb-uname"></span>
    <button class="tb-logout" onclick="(function(){localStorage.removeItem('pitogo_token');localStorage.removeItem('pitogo_username');window.location.href='/'})()">Log out</button>
  </div>
</div>
<script>
(function(){
  var u = localStorage.getItem('pitogo_username') || '';
  var el = document.getElementById('tb-uname');
  if (el && u) el.textContent = u;
  var p = window.location.pathname;
  document.querySelectorAll('.tb-nav a').forEach(function(a){
    if (a.getAttribute('href') === p) a.classList.add('tb-active');
  });
})();
</script>
